<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="512" height="512">
  <!-- Main calendar body -->
  <rect x="8" y="18" width="84" height="74" rx="6" ry="6" fill="#000"/>
  <!-- White inner body -->
  <rect x="8" y="34" width="84" height="58" rx="0" ry="0" fill="#fff"/>
  <rect x="8" y="34" width="84" height="58" rx="6" ry="6" fill="#fff"/>
  <!-- Fix bottom corners, keep top flat after header -->
  <rect x="8" y="34" width="84" height="10" fill="#fff"/>

  <!-- Header bar (dark) -->
  <rect x="8" y="18" width="84" height="22" rx="6" ry="6" fill="#000"/>
  <rect x="8" y="30" width="84" height="10" fill="#000"/>

  <!-- Ring left -->
  <rect x="28" y="10" width="8" height="18" rx="4" ry="4" fill="#000"/>
  <!-- Ring right -->
  <rect x="64" y="10" width="8" height="18" rx="4" ry="4" fill="#000"/>

  <!-- Grid dots — 3 rows x 4 cols -->
  <!-- Row 1 -->
  <rect x="18" y="48" width="10" height="8" rx="2" fill="#000"/>
  <rect x="34" y="48" width="10" height="8" rx="2" fill="#000"/>
  <rect x="50" y="48" width="10" height="8" rx="2" fill="#000"/>
  <rect x="66" y="48" width="10" height="8" rx="2" fill="#000"/>

  <!-- Row 2 -->
  <rect x="18" y="62" width="10" height="8" rx="2" fill="#000"/>
  <rect x="34" y="62" width="10" height="8" rx="2" fill="#000"/>
  <rect x="50" y="62" width="10" height="8" rx="2" fill="#000"/>
  <rect x="66" y="62" width="10" height="8" rx="2" fill="#000"/>

  <!-- Row 3 -->
  <rect x="18" y="76" width="10" height="8" rx="2" fill="#000"/>
  <rect x="34" y="76" width="10" height="8" rx="2" fill="#000"/>
  <rect x="50" y="76" width="10" height="8" rx="2" fill="#000"/>
</svg>
